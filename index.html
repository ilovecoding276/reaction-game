<!DOCTYPE html>
<html>
<head>
    <title>Reaction Challenge Game</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
        }

        #box {
            width: 300px;
            height: 300px;
            background-color: red;
            margin: 30px auto;
            cursor: pointer;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
        }

        #info {
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Reaction Challenge Game</h1>

<p>Wait for the box to turn green, then click as fast as you can!</p>

<div id="box"></div>

<div id="info">
    <p>Score: <span id="score">0</span></p>
    <p>Lives: <span id="lives">3</span></p>
    <p>Time Left: <span id="time">30</span> seconds</p>
    <p>Best Time: <span id="best">None</span></p>
</div>

<button onclick="restartGame()">
    Restart Game
</button>

<p id="result"></p>

<script src="game.js"></script>

</body>
</html>
